server:
  port: 9998
  servlet:
    session:
      timeout: 8h   # 로그인 세션 8시간 유지

spring:
  datasource:
    url: jdbc:h2:file:./data/pagebuilder;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# Ollama 설정
ollama:
  base-url: http://localhost:11434
  model: codellama          # HTML/CSS 코드 생성에 최적화
  vision-model: llava       # 이미지 분석용 (ollama pull llava 필요)
  timeout: 120000

logging:
  level:
    com.example.pagebuilder: DEBUG
