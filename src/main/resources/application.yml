server:
  port: 9998
  servlet:
    session:
      timeout: 8h   # 로그인 세션 8시간 유지

spring:
  datasource:
    url: jdbc:h2:file:./data/pagebuilder;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# Groq API 설정 (https://console.groq.com 에서 무료 발급)
groq:
  api-key: ${GROQ_API_KEY:your-api-key-here}
  base-url: https://api.groq.com/openai/v1
  model: llama-3.3-70b-versatile          # 텍스트 HTML 생성
  vision-model: meta-llama/llama-4-scout-17b-16e-instruct  # 이미지 분석

logging:
  level:
    com.example.pagebuilder: DEBUG
