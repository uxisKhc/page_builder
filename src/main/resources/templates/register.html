<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 — Page Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
        .card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 16px 16px 0 0 !important; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header text-white text-center py-4">
                    <h3 class="mb-0"><i class="fas fa-magic me-2"></i>Page Builder</h3>
                    <small>회원가입</small>
                </div>
                <div class="card-body p-4">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form method="post" action="/register">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="mb-3">
                            <label class="form-label fw-bold">아이디</label>
                            <input type="text" name="username" class="form-control" placeholder="4~20자 영문, 숫자" required minlength="4" maxlength="20">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">이메일</label>
                            <input type="email" name="email" class="form-control" placeholder="이메일 주소" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">비밀번호</label>
                            <input type="password" name="password" class="form-control" placeholder="6자 이상" required minlength="6">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">비밀번호 확인</label>
                            <input type="password" name="passwordConfirm" class="form-control" placeholder="비밀번호 재입력" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                            <i class="fas fa-user-plus me-2"></i>가입하기
                        </button>
                    </form>

                    <hr class="my-4">
                    <div class="text-center">
                        <span class="text-muted">이미 계정이 있으신가요?</span>
                        <a href="/login" class="ms-2 fw-bold text-decoration-none">로그인</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
